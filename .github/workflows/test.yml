name: test

# Runs the pytest suite on every push to main and every PR. Fast (<10s
# total when there's nothing to install from cache); no scraper secrets
# needed since tests are pure-logic.
on:
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # We don't need the scrape-time deps (curl_cffi, playwright) for unit
          # tests — only PyYAML for classify.py + pytest itself. Keep the test
          # install minimal so CI stays fast and doesn't break when the heavy
          # deps have wheel issues on new Python versions.
          pip install pytest pyyaml

      - name: Run pytest
        run: python -m pytest scraper/tests/ -v
