name: test

# Runs the pytest suite + ruff lint on every push to main and every PR.
# Fast (<10s total when there's nothing to install from cache); no scraper
# secrets needed since tests are pure-logic and ruff is static analysis.
on:
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - 'subscribe-worker/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # We don't need the scrape-time deps (curl_cffi, playwright) for unit
          # tests — only PyYAML for classify.py + pytest itself. Keep the test
          # install minimal so CI stays fast and doesn't break when the heavy
          # deps have wheel issues on new Python versions.
          pip install pytest pyyaml ruff

      - name: Lint (ruff)
        run: ruff check scraper/

      - name: Run pytest
        run: python -m pytest scraper/tests/ -v

  worker-tests:
    # Worker JS unit tests — Svix sig verify, sanitizeNick, rate-limit math.
    # Pure-logic, Node-only; no Wrangler/Miniflare required.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bundle check (esbuild)
        working-directory: subscribe-worker
        run: npx --yes esbuild worker.js --bundle --platform=neutral --target=es2022 --outfile=/tmp/_worker_check.js
      - name: Run worker tests
        working-directory: subscribe-worker
        run: node test_worker.mjs
