name: email-only

# Send email using the EXISTING data/projects.json — no scrape.
#
# Used for emergency-refresh days when the normal cron's scrape step
# can't reach KS (CF blocked discover). We refresh data locally via
# scripts/emergency_refresh.py, commit the snapshot, then trigger this
# workflow to broadcast.
#
# Manual trigger only — workflow_dispatch with no schedule, so it
# never runs on its own.

on:
  workflow_dispatch:

jobs:
  email-only:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Email path doesn't need curl_cffi / playwright — just the
          # report + email bits.
          pip install -r requirements.txt

      - name: Send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          OWNER_TOKEN: ${{ secrets.OWNER_TOKEN }}
          SUBSCRIBE_API_URL: ${{ secrets.SUBSCRIBE_API_URL }}
        run: python -m scraper.email_notify

      - name: Commit any new artifacts (edition HTML)
        run: |
          git config user.name "ks-tracker-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/editions/ reports/ assets/ || true
          if git diff --staged --quiet; then
            echo "No new artifacts."
            exit 0
          fi
          git commit -m "emergency refresh email $(date -u +%FT%TZ)"
          git push
