name: deploy-pages

on:
  # Cascades after scrape.yml so daily cron output reaches Pages without
  # a manual dispatch. (GITHUB_TOKEN-driven push commits do NOT trigger
  # the `push` event on other workflows — workflow_run does.)
  workflow_run:
    workflows: ["scrape"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - "assets/**"
      - "reports/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble pages bundle
        run: |
          mkdir -p _site
          cp -r site/* _site/
          # data/ — projects.json + slices + subscribers + blurbs (stats.html reads these)
          mkdir -p _site/data
          cp data/projects.json _site/data/
          cp data/prelaunch.json _site/data/ 2>/dev/null || true
          cp data/live.json _site/data/ 2>/dev/null || true
          cp data/subscribers.json _site/data/ 2>/dev/null || true
          cp data/blurbs_zh.json _site/data/ 2>/dev/null || true
          # assets/ — banner / snapshot / og-card SVGs (og:image meta points here)
          mkdir -p _site/assets
          cp -r assets/* _site/assets/ 2>/dev/null || true
          # reports/ — Markdown daily reports (linked from README, served raw)
          mkdir -p _site/reports
          cp -r reports/* _site/reports/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
