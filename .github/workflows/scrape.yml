name: scrape

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours UTC
  workflow_dispatch:        # manual run from Actions tab

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.run

      - name: Commit changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ks-tracker-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "snapshot $(date -u +%FT%TZ)"
          git push

      - name: Notify (optional)
        if: env.SLACK_WEBHOOK != '' || env.DISCORD_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scraper.notify
