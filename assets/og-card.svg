<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <rect width="1280" height="640" fill="#F9F9F7"/>

  <!-- Top edition strip -->
  <rect x="0" y="0" width="1280" height="46" fill="#111111"/>
  <circle cx="50" cy="23" r="5" fill="#CC0000"/>
  <text x="68" y="28" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="700"
