  <text x="640" y="312" text-anchor="middle" font-family="Playfair Display, Times New Roman, serif" font-size="118"
        font-weight="900" fill="#111111" letter-spacing="-4">China Tracker</text>

  <!-- Italic dek -->
  <text x="640" y="362" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="20"
