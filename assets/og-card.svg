  <line x1="80" y1="450" x2="1200" y2="450" stroke="#111111" stroke-width="4"/>

  <!-- KPI strip -->
  <text x="160" y="544" text-anchor="middle" font-family="Playfair Display, Times New Roman, serif" font-size="64"
