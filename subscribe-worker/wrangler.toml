name = "ks-tracker-subscribe"
main = "worker.js"
compatibility_date = "2024-12-01"

# Public-facing variables (visible in dashboard, OK to commit)
[vars]
ALLOWED_ORIGIN = "https://ks.aldrich.fyi,https://chen17-sq.github.io"

# KV namespace binding — referenced in code as env.SUBSCRIBERS_KV.
# Created via dashboard; ID below pulled from `wrangler kv namespace list`.
[[kv_namespaces]]
binding = "SUBSCRIBERS_KV"
id = "d55c5be8ae7a4a83847805032ebd36fb"

# Secrets (DO NOT commit) — set via:
#   npx wrangler secret put OWNER_TOKEN
# or via Cloudflare dashboard → Worker → Settings → Variables → Add encrypted variable
#
# Required:
#   OWNER_TOKEN — random secret used by GET /list and POST /unsubscribe.
#                 Generate with: openssl rand -hex 32
#                 Also stored as a GH Actions secret of the same name so
#                 scraper/subscribers.py can authenticate when reading the
#                 subscriber list during the daily email job.
#
# Removed (KV migration replaces these):
#   GITHUB_TOKEN — no longer needed; subscribers stored in KV, not GitHub
#   GITHUB_REPO  — same
