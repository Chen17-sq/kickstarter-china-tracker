name = "ks-tracker-subscribe"
main = "worker.js"
compatibility_date = "2024-12-01"

# Public-facing variables (visible in dashboard, OK to commit)
[vars]
GITHUB_REPO = "Chen17-sq/kickstarter-china-tracker"
ALLOWED_ORIGIN = "https://chen17-sq.github.io"

# Secrets (DO NOT commit) — set via:
#   npx wrangler secret put GITHUB_TOKEN
# or via Cloudflare dashboard → Worker → Settings → Variables → Add encrypted variable
#
# Required:
#   GITHUB_TOKEN — fine-grained PAT with 'Contents: Read and write' on the repo above
